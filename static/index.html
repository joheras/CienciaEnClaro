<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CienciaEnClaro</title>
    <!-- Quill CSS -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/styles.css">

</head>
<body>
<div class="container">


<!-- Editor con toolbar -->
<div class="panel center">
    <div id="toolbar">
    <!-- Formato básico -->

            <!-- NUEVOS BOTONES: Cargar y Descargar -->
        <span class="ql-formats">
            <button id="loadFileBtn" title="Cargar archivo"><i class="fa-solid fa-file-import"></i></button>
            <button id="downloadBtn" title="Descargar"><i class="fa-solid fa-download"></i></button>
            <button id="exampleTextBtn" title ="Texto de ejemplo"><i class="fa-solid fa-file-lines"></i></button>
            <span class="toolbar-separator"></span>
        </span>

        <span class="ql-formats">
            <button class="ql-bold"></button>
            <button class="ql-italic"></button>
            <button class="ql-underline"></button>
            <button class="ql-strike"></button>
        </span>

        <!-- Fuente y tamaño -->
        <span class="ql-formats">
            <select class="ql-font"></select>
            <select class="ql-size"></select>
        </span>

        <!-- Color y fondo -->
        <span class="ql-formats">
            <select class="ql-color"></select>
            <select class="ql-background"></select>
          </span>

        <!-- Listas y alineación -->
        <span class="ql-formats">
            <button class="ql-list" value="ordered"></button>
            <button class="ql-list" value="bullet"></button>
            <button class="ql-align" value=""></button>
            <button class="ql-align" value="center"></button>
            <button class="ql-align" value="right"></button>
            <button class="ql-align" value="justify"></button>
          </span>

        <!-- Links, imágenes y videos -->
        <span class="ql-formats">
            <button class="ql-link"></button>
            <button class="ql-image"></button>
            <button class="ql-video"></button>
          </span>

        <span class="ql-formats">
          <select class="ql-header">
            <option selected value="0">Normal</option>
            <option value="1">Título 1</option>
            <option value="2">Título 2</option>
            <option value="3">Título 3</option>
          </select>
        </span>

        <!-- Deshacer / Rehacer -->
        <span class="ql-formats">
            <button class="ql-undo"><i class="fa-solid fa-rotate-left"></i></button>
            <button class="ql-redo"><i class="fa-solid fa-rotate-right"></i></button>
        </span>

        <!-- Swtich editar -->
        <span class="edit-switch">
            <label class="switch">
                <input type="checkbox" id="editToggle" checked>
                <span class="slider"></span>
            </label>
            <span id="editLabel">Editar</span>
        </span>



    </div>
    <div class="editor-wrapper">
      <div id="paragraphNumbers"></div>
      <div id="editor"></div>
    </div>
</div>

<!-- Panel de comentarios -->
<div class="leftPanel">
    <!-- Imagen logo -->
    <div id="logoContainer">
        <img id="panelLogo" src="/static/logo.png" alt="Logo">
    </div>
    <div id="commentsPanel">
        <div id="modeButtons">
            <!--  <button id="writeModeBtn" class="mode-btn active">Editar</button> -->
            <button id="feedbackModeBtn" class="mode-btn">Análisis</button>
            <button id = "analysisModeBtn" class ="mode-btn">Estadísticas</button>
        </div>
        <div id="filtersRow">
      <!-- <label for="filterType">Comentarios. Filtro por tipo:</label> -->
            <div id="filterContainer">
                <label for="filterType">Filtro:</label>
                <select id="filterType"></select>
            </div>
            <!--- otro filtro para filtrar por párrafos --->
            <div id="filterText">
                <label for="filterParagraph">Párrafos:</label>
                <select id="filterParagraph"></select>
            </div>
        </div>
        <!-- Botones personalizados con iconos -->
        <span class="ql-formats">
            <!--<button id="paragraphBtn" class="ql-paragraph" title="Analizar párrafo"> Analizar párrafo</button>-->
            <button id="addCommentFirst10Btn" class="ql-comment10" title="Analizar texto"> Analizar texto</button>

            </span>
        <div class="ql-formats highlight-switch-block">
           <label class="switch">
                <input type="checkbox" id="toggleHighlight" checked>
                <span class="slider"></span>
            </label>
            <span id="resaltarLabel">Resaltar comentarios</span>

        </div>
        <!-- Botón recalcular -->
        <div id="result"></div>
        <button id="recalculateBtn">Recalcular comentarios</button>
        <div id="commentsList"></div>

        <button id="generateSuggestionBtn" class="generate-btn">Generar sugerencia</button>

        <!-- Análisis -->
        <div id="analysisContainer"> Análisis del texto </div>
        <button id="analyzeBtn" class="ql-analyze" title="Resumen texto"><i class="fa-solid fa-rotate"></i></button>
    </div>
</div>

<!-- Overlay de carga -->
<div id="loadingOverlay">
    <div class="loadingContent">
        <i class="fa-solid fa-spinner fa-spin"></i>
        <span>En proceso...</span>
    </div>
</div>


<!-- popup para mostrar el análisis -->
<!--
<div id="analysisPopup" class="popup-overlay" aria-hidden="true">
    <div class="poppup-content" role="dialog" aria-modal="true" aria-labelledby="analysisTitle">
        <button id="closePopupBtn" class="close-btn" aria-label="Cerrar ventana">&times;</button>
        <h3 id="analysisTitle">Resultado del análisis</h3>
        <p id="analysisText"></p>
    </div>
</div>
-->

    <!-- popup para la sugerencia del párrafo -->
    <div id="suggestionModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Generar sugerencia</h2>
            </div>
            <div class="modal-body">
                <div class="panel">
                    <h3>Texto original</h3>
                    <textarea id="originalText" readonly></textarea>
                </div>
                <div class="panel">
                    <h3>Sugerencia</h3>
                    <textarea id="suggestedText"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button id="closeModalBtn">Cerrar</button>
                <button id="newSuggestionBtn">Generar otra sugerencia</button>
                <button id="useSuggestionBtn">Usar sugerencia</button>
            </div>
        </div>
    </div>

<!-- Quill JS -->
<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
